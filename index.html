<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom XP Card Generator - godthedogabs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chewy&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Hero Banner -->
  <div class="hero">
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <a href="#" class="back-link">&larr; BACK</a>
      <h1 class="hero-title">CUSTOM XP CARD GENERATOR</h1>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs-bar">
    <button class="tab active" data-tab="weekly">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Weekly XP Card
    </button>
    <button class="tab" data-tab="cumulative">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/></svg>
      Cumulative XP Card
    </button>
  </div>

  <!-- Main Content -->
  <main class="main">
    <!-- Left: Card Preview -->
    <div class="preview-col">
      <div class="card-wrap" id="cardWrap">
        <div class="xp-card" id="xpCard">
          <!-- Background -->
          <div class="card-bg" id="cardBg"></div>
          <div class="card-overlay" id="cardOverlay"></div>

          <!-- Card Content -->
          <div class="card-inner">
            <!-- Top row: logo + project icon -->
            <div class="card-top">
              <div class="card-logo">
                <svg class="abs-mark" width="30" height="28" viewBox="-2 -2 28 26" fill="currentColor"><!-- Shadow layers (offset, progressively more transparent) --><g transform="translate(0.5, 1.5)" fill="rgba(0,0,0,0.15)"><path d="M15.821 14.984L20.642 19.759L18.38 21.999L13.56 17.225A2.001 2.001 0 0012.015 16.592a2 2 0 00-1.544.633L5.651 21.999 3.389 19.759l4.82-4.775h7.612z M16.626 13.608l6.583 1.745.827-3.063-6.583-1.745a2.001 2.001 0 01-1.326-1.009 1.999 1.999 0 01-.218-1.641l1.762-6.521-3.092-.818-1.763 6.52 3.807 6.528z M7.409 13.608L.827 15.353 0 12.29l6.583-1.745c.563-.149 1.033-.507 1.326-1.009.293-.499.368-1.083.218-1.641L6.365 1.374l3.092-.818 1.762 6.52-3.806 6.528z"/></g><g transform="translate(0.3, 1)" fill="rgba(0,0,0,0.2)"><path d="M15.821 14.984L20.642 19.759L18.38 21.999L13.56 17.225A2.001 2.001 0 0012.015 16.592a2 2 0 00-1.544.633L5.651 21.999 3.389 19.759l4.82-4.775h7.612z M16.626 13.608l6.583 1.745.827-3.063-6.583-1.745a2.001 2.001 0 01-1.326-1.009 1.999 1.999 0 01-.218-1.641l1.762-6.521-3.092-.818-1.763 6.52 3.807 6.528z M7.409 13.608L.827 15.353 0 12.29l6.583-1.745c.563-.149 1.033-.507 1.326-1.009.293-.499.368-1.083.218-1.641L6.365 1.374l3.092-.818 1.762 6.52-3.806 6.528z"/></g><!-- Main logo --><path d="M15.821 14.984L20.642 19.759L18.38 21.999L13.56 17.225A2.001 2.001 0 0012.015 16.592a2 2 0 00-1.544.633L5.651 21.999 3.389 19.759l4.82-4.775h7.612z M16.626 13.608l6.583 1.745.827-3.063-6.583-1.745a2.001 2.001 0 01-1.326-1.009 1.999 1.999 0 01-.218-1.641l1.762-6.521-3.092-.818-1.763 6.52 3.807 6.528z M7.409 13.608L.827 15.353 0 12.29l6.583-1.745c.563-.149 1.033-.507 1.326-1.009.293-.499.368-1.083.218-1.641L6.365 1.374l3.092-.818 1.762 6.52-3.806 6.528z"/></svg>
                <span>abstract</span>
              </div>
              <div class="card-project-icon" id="cardProjectIcon">
                <img src="assets/god-the-dog.png" alt="God the Dog" id="projectIconImg">
              </div>
            </div>

            <!-- Line graph (cumulative only) -->
            <div class="card-graph" id="cardGraph" style="display:none">
              <canvas id="graphCanvas" width="600" height="160"></canvas>
            </div>

            <!-- Bottom: avatar, name, xp -->
            <div class="card-bottom">
              <div class="card-avatar" id="cardAvatar">
                <img src="" alt="" id="avatarImg" style="display:none">
                <div class="avatar-placeholder" id="avatarPlaceholder">?</div>
              </div>
              <div class="card-user-info">
                <div class="card-username" id="cardUsername">Username</div>
                <div class="card-xp" id="cardXp">0 XP</div>
                <div class="card-subtitle" id="cardSubtitle">
                  <span class="card-tab-label" id="cardTabLabel">Weekly XP</span>
                </div>
              </div>
            </div>

            <!-- Branding -->
            <div class="card-branding">abs.xyz</div>
          </div>
        </div>
      </div>

      <!-- Export Buttons -->
      <div class="export-row">
        <button class="btn-export btn-gif" id="exportGif">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download PNG
        </button>
      </div>
    </div>

    <!-- Right: Controls -->
    <div class="controls-col">
      <!-- Color -->
      <div class="control-group">
        <label class="control-label">Color</label>
        <div class="color-swatches" id="colorSwatches">
          <button class="swatch active" data-color="#ffffff" style="background:#ffffff" title="White"></button>
          <button class="swatch" data-color="#a1a1aa" style="background:#a1a1aa" title="Grey"></button>
          <button class="swatch" data-color="#1a1a1a" style="background:#1a1a1a;border:1px solid #52525b" title="Black"></button>
        </div>
      </div>

      <!-- Background Overlay -->
      <div class="control-group">
        <label class="control-label">Background Overlay</label>
        <div class="overlay-controls">
          <div class="overlay-btns">
            <button class="overlay-btn active" data-overlay="black">Black</button>
            <button class="overlay-btn" data-overlay="white">White</button>
          </div>
          <div class="overlay-slider-wrap">
            <span class="overlay-dot" id="overlayDot"></span>
            <input type="range" id="overlayOpacity" class="overlay-slider" min="0" max="100" value="0">
            <span class="overlay-val" id="overlayVal">0%</span>
          </div>
        </div>
      </div>

      <!-- Name -->
      <div class="control-group">
        <div class="control-row">
          <label class="control-label" for="inputName">Name</label>
          <input type="text" id="inputName" class="control-input" placeholder="Enter your name" maxlength="32">
        </div>
      </div>

      <!-- Upload PFP -->
      <div class="control-group">
        <button class="btn-upload" id="uploadPfpBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17,8 12,3 7,8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Upload PFP
        </button>
        <input type="file" id="pfpUpload" accept="image/*" hidden>
        <p class="control-hint">Upload a custom image for your profile picture on the card.</p>
      </div>

      <!-- XP Value (weekly only) -->
      <div class="control-group controls-weekly">
        <div class="control-row">
          <label class="control-label" for="inputXp">XP Value</label>
          <input type="number" id="inputXp" class="control-input" value="0" min="0">
        </div>
      </div>

      <!-- Cumulative Controls -->
      <div class="controls-cumulative" style="display:none">
        <div class="control-group">
          <div class="control-row">
            <label class="control-label" for="inputStartWeek">Start Week</label>
            <input type="text" id="inputStartWeek" class="control-input" placeholder="e.g. Week 1" maxlength="20">
          </div>
        </div>
        <div class="control-group">
          <div class="control-row">
            <label class="control-label" for="inputEndWeek">End Week</label>
            <input type="text" id="inputEndWeek" class="control-input" placeholder="e.g. Week 8" maxlength="20">
          </div>
        </div>
        <div class="control-group">
          <label class="control-label" for="inputWeeklyData">Weekly XP Data Points</label>
          <input type="text" id="inputWeeklyData" class="control-input" placeholder="e.g. 120, 340, 200, 580, 410, 300, 670, 520">
          <p class="control-hint">Enter comma-separated XP values for each week. The graph will plot the cumulative total.</p>
        </div>
        <div class="control-group">
          <label class="control-label">Graph Line Color</label>
          <div class="color-swatches" id="graphColorSwatches">
            <button class="swatch graph-color-swatch active" data-graph-color="#4ade80" style="background:#4ade80" title="Green"></button>
            <button class="swatch graph-color-swatch" data-graph-color="#60a5fa" style="background:#60a5fa" title="Blue"></button>
            <button class="swatch graph-color-swatch" data-graph-color="#f472b6" style="background:#f472b6" title="Pink"></button>
            <button class="swatch graph-color-swatch" data-graph-color="#facc15" style="background:#facc15" title="Yellow"></button>
            <button class="swatch graph-color-swatch" data-graph-color="#ffffff" style="background:#ffffff" title="White"></button>
          </div>
        </div>
      </div>

      <!-- Background Images -->
      <div class="control-group">
        <div class="control-label-row">
          <label class="control-label">Background Images</label>
          <button class="shuffle-btn" id="shuffleBtn" title="Random">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16,3 21,3 21,8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21,16 21,21 16,21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
          </button>
        </div>
        <div class="bg-grid" id="bgGrid">
          <!-- Background thumbnails injected by JS -->
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
